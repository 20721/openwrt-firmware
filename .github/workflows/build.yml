name: Build ImmortalWrt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -hT

      - name: Clone source code
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "WORK_DIR=$PWD" >> $GITHUB_ENV

      - name: Copy configuration
        run: |
          cp feeds.conf openwrt/feeds.conf
          cp .config openwrt/.config

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download dl package
        working-directory: openwrt
        run: make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "build_size=$(du -sz bin/targets/ | awk '{print $1}')" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-x86_64
          path: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.manifest
            openwrt/bin/targets/x86/64/sha256sums

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.manifest
          body: |
            ## ImmortalWrt x86_64 固件
            
            ### 包含插件
            - FRP 客户端 (frpc)
            - 网络加速 (BBR/tproxy)
            - OpenClash (去广告/代理)
            - AdGuard Home (DNS 去广告)
            - LuCI 管理界面
            - Samba4 (文件共享)
            - NAS 支持 (EXT4/NTFS/vfat)
            
            ### 使用说明
            1. 下载 *.combined.img.gz 文件
            2. 解压后写入 U 盘或硬盘
            3. 从 U 盘/硬盘启动即可
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
